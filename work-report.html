<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作报告 · Work Review</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --border: #242836;
    --text: #e8eaf0;
    --muted: #5a6070;
    --accent: #4af0a0;
    --accent-dim: rgba(74,240,160,0.12);
    --approve: #4af0a0;
    --reject: #f05a5a;
    --notyet: #f0b84a;
    --keepgoing: #4ab8f0;
    --approve-bg: rgba(74,240,160,0.1);
    --reject-bg: rgba(240,90,90,0.1);
    --notyet-bg: rgba(240,184,74,0.1);
    --keepgoing-bg: rgba(74,184,240,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 40px 20px 100px;
  }
  header {
    max-width: 920px; margin: 0 auto 36px;
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 1px solid var(--border); padding-bottom: 18px;
  }
  .logo-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -0.5px; }
  .date-stamp { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); text-align: right; line-height: 1.8; }

  .filter-bar { max-width: 920px; margin: 0 auto 24px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1.5px; margin-right: 2px; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .container { max-width: 920px; margin: 0 auto; }

  .section-header { display: flex; align-items: center; gap: 14px; margin: 28px 0 10px; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
  .section-label.focus   { background: rgba(74,240,160,0.15); color: var(--accent); border: 1px solid var(--accent); }
  .section-label.active  { background: rgba(74,184,240,0.12); color: var(--keepgoing); border: 1px solid var(--keepgoing); }
  .section-label.stopped { background: rgba(240,90,90,0.1); color: var(--reject); border: 1px solid var(--reject); }
  .section-divider { flex: 1; height: 1px; background: var(--border); }
  .section-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }

  .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 9px; overflow: hidden; transition: border-color 0.2s; }
  .project-card.focus-card { border-left: 3px solid var(--accent); }
  .project-card.selected-approve   { border-color: var(--approve); }
  .project-card.selected-reject    { border-color: var(--reject); }
  .project-card.selected-notyet   { border-color: var(--notyet); }
  .project-card.selected-keepgoing { border-color: var(--keepgoing); }

  .card-header { display: flex; align-items: center; padding: 13px 18px; gap: 12px; cursor: pointer; user-select: none; }
  .project-index { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 24px; flex-shrink: 0; }
  .project-info { flex: 1; min-width: 0; }
  .project-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13.5px; color: var(--text); line-height: 1.4; }
  .project-url { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-decoration: none; transition: color 0.15s; display: block; margin-top: 2px; }
  .project-url:hover { color: var(--accent); }
  .project-desc { font-size: 11.5px; color: var(--muted); margin-top: 3px; line-height: 1.5; }

  .card-tag { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; padding: 3px 7px; border-radius: 4px; text-transform: uppercase; flex-shrink: 0; }
  .tag-stopped { background: rgba(240,90,90,0.1); color: var(--reject); }
  .tag-active  { background: rgba(74,184,240,0.1); color: var(--keepgoing); }
  .tag-focus   { background: rgba(74,240,160,0.15); color: var(--accent); }
  .tag-pending { background: rgba(240,184,74,0.1); color: var(--notyet); }

  .card-status { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; background: var(--border); color: var(--muted); transition: all 0.2s; flex-shrink: 0; }
  .card-status.approve   { background: var(--approve-bg);  color: var(--approve); }
  .card-status.reject    { background: var(--reject-bg);   color: var(--reject); }
  .card-status.notyet    { background: var(--notyet-bg);   color: var(--notyet); }
  .card-status.keepgoing { background: var(--keepgoing-bg);color: var(--keepgoing); }

  .toggle-icon { color: var(--muted); font-size: 15px; transition: transform 0.2s; width: 16px; text-align: center; flex-shrink: 0; }
  .card-body { display: none; padding: 0 18px 16px; border-top: 1px solid var(--border); }
  .card-body.open { display: block; }

  .decision-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .decision-btn { flex: 1; min-width: 88px; padding: 8px 6px; border: 1.5px solid var(--border); border-radius: 7px; background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .decision-btn[data-value="approve"]   { --c: var(--approve); }
  .decision-btn[data-value="reject"]    { --c: var(--reject); }
  .decision-btn[data-value="notyet"]    { --c: var(--notyet); }
  .decision-btn[data-value="keepgoing"] { --c: var(--keepgoing); }
  .decision-btn:hover { color: var(--c); border-color: var(--c); }
  .decision-btn.active { color: var(--c); border-color: var(--c); background: rgba(from var(--c) r g b / 0.1); box-shadow: 0 0 0 1px var(--c) inset; }

  .note-row { margin-top: 11px; display: flex; flex-direction: column; gap: 5px; }
  .note-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .note-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-size: 12px; padding: 8px 12px; resize: vertical; min-height: 52px; outline: none; transition: border-color 0.15s; }
  .note-input:focus { border-color: var(--accent); }

  .submit-area { max-width: 920px; margin: 28px auto 0; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .submit-btn { padding: 12px 30px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:active { transform: scale(0.98); }
  .progress-bar { flex: 1; min-width: 140px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }
  .submit-hint { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(13,15,20,0.9); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .log-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: min(700px, 94vw); max-height: 82vh; display: flex; flex-direction: column; overflow: hidden; }
  .log-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; border-bottom: 1px solid var(--border); }
  .log-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .log-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px; transition: color 0.15s; }
  .log-close:hover { color: var(--text); }
  .log-body { flex: 1; overflow-y: auto; }
  .log-content { font-family: 'DM Mono', monospace; font-size: 11px; line-height: 1.9; color: var(--accent); padding: 18px 22px; white-space: pre-wrap; word-break: break-all; }
  .log-actions { display: flex; gap: 10px; padding: 14px 22px; border-top: 1px solid var(--border); }
  .copy-btn, .dl-btn { padding: 8px 16px; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .copy-btn { background: var(--accent-dim); border: 1.5px solid var(--accent); color: var(--accent); }
  .copy-btn:hover { background: var(--accent); color: var(--bg); }
  .dl-btn { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
  .dl-btn:hover { border-color: var(--text); color: var(--text); }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-label">TJ Development Inc.</div>
    <h1>工作进度 Review</h1>
  </div>
  <div class="date-stamp" id="dateStamp"></div>
</header>

<div class="filter-bar">
  <span class="filter-label">筛选 ·</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">全部 All</button>
  <button class="filter-btn" onclick="setFilter('focus',this)">🟢 当前重点</button>
  <button class="filter-btn" onclick="setFilter('active',this)">🔵 进行中</button>
  <button class="filter-btn" onclick="setFilter('stopped',this)">🔴 已停止</button>
  <button class="filter-btn" onclick="setFilter('unreviewed',this)">○ 未评审</button>
</div>

<div class="container" id="projectList"></div>

<div class="submit-area">
  <button class="submit-btn" onclick="submitReport()">提交报告 Submit</button>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="submit-hint" id="progressLabel">0 / 0 已评审</span>
</div>

<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="log-modal">
    <div class="log-header">
      <span class="log-title">📋 Report Log</span>
      <button class="log-close" onclick="closeModal()">×</button>
    </div>
    <div class="log-body"><pre class="log-content" id="logContent"></pre></div>
    <div class="log-actions">
      <button class="copy-btn" onclick="copyLog()">Copy Log</button>
      <button class="dl-btn" onclick="downloadLog()">Download .txt</button>
    </div>
  </div>
</div>

<script>
const SECTIONS = [
  {
    key: "focus",
    label: "当前重点 Focus",
    cls: "focus",
    projects: [
      { name: "军工业餐饮提供可行性研究", url: "", desc: "Military/defense industry catering feasibility analysis", tag: "focus" },
      { name: "orda.la 网站细节设计", url: "https://orda.la", desc: "不追求完美，能看能用就行", tag: "focus" },
      { name: "ChowNow 设置与网站布局优化", url: "", desc: "不细节化研究，以提高销量为目标", tag: "focus" },
    ]
  },
  {
    key: "active",
    label: "进行中 Active",
    cls: "active",
    projects: [
      { name: "2025 Dolan's All Spending Data Collection & Analysis", url: "", desc: "数据收集与分析，预计完成：2025 年 6 月底", tag: "active" },
      { name: "Cintas 合同终止处理", url: "", desc: "信件已发送，确认收到后与 Cali Linen 进行接管安排", tag: "active" },
      { name: "Zoya Wedding", url: "", desc: "婚礼餐饮服务，进行中，预计完成：4/25", tag: "active" },
      { name: "Dolan's Reward Print", url: "", desc: "等候已完成的 15 个设计方案反馈", tag: "pending" },
      { name: "Tap to Review 页面", url: "", desc: "设计已完成，不追求细节，能用就行，更新时再重新设计", tag: "active" },
      { name: "Google Ads 分析与更新", url: "", desc: "由每周一次改为每两周一次", tag: "active" },
      { name: "Dolan's 所有支付账号细节汇总", url: "", desc: "保持现有状况，出问题再解决", tag: "pending" },
    ]
  },
  {
    key: "stopped",
    label: "已停止 Stopped",
    cls: "stopped",
    projects: [
      { name: "Irvine Inventory QR Order System", url: "", desc: "停止自动化设计，没必要", tag: "stopped" },
      { name: "TV Menu Digital System", url: "", desc: "停止设计，没必要", tag: "stopped" },
      { name: "Dolan's 进货物品分析仪表盘", url: "", desc: "停止设计，没必要", tag: "stopped" },
      { name: "Paper Bag 货源寻找", url: "", desc: "停止寻找，目前没必要", tag: "stopped" },
      { name: "Toast 自动发送邮件格式重设计", url: "", desc: "停止更改，继续沿用原有系统设计", tag: "stopped" },
      { name: "餐厅 Reservation & Catering Order System", url: "", desc: "停止更新，没必要", tag: "stopped" },
      { name: "Alhambra Toast Sale Category Details 设置", url: "", desc: "停止操作，没有意义", tag: "stopped" },
      { name: "Toast 网站 dolansusa.com 附加页面", url: "https://dolansusa.com", desc: "停止，换到 ChowNow，不再在 Toast 上浪费时间", tag: "stopped" },
      { name: "AL Toast Items Modifier 重新分组优化", url: "", desc: "停止，没有意义，后厨看着解决", tag: "stopped" },
      { name: "2025 Kurbanjan Shopping Receipt 收集与数据分析", url: "", desc: "停止，只从 2026 年开始收集，半年为单位整理", tag: "stopped" },
      { name: "Catering Order Price 设定 & 在线订购开发", url: "", desc: "停止，使用 ChowNow 功能，不单独开发", tag: "stopped" },
      { name: "AI 读取 X 平台内容 · 餐饮 AI 操作研究", url: "", desc: "停止研究，没有意义", tag: "stopped" },
      { name: "Claude AI 餐厅自动化网站发文上帖", url: "", desc: "停止，浪费时间，可能产生额外费用", tag: "stopped" },
      { name: "所有 Dolan's 系统多合一开发布局", url: "", desc: "停止，浪费时间", tag: "stopped" },
      { name: "Owner Toast Solution 研究", url: "", desc: "停止研究，会产生额外费用", tag: "stopped" },
      { name: "AL / IR 所有菜品详细介绍优化", url: "", desc: "停止，保持目前状态，不影响销售", tag: "stopped" },
      { name: "Toast 自动邮件发送模板优化 (新版本)", url: "", desc: "停止新版本开发，使用系统默认", tag: "stopped" },
      { name: "Dolan's 所有员工信息汇总系统", url: "", desc: "停止开发，没有意义", tag: "stopped" },
    ]
  }
];

// Build flat list with global indices
const ALL = [];
SECTIONS.forEach(sec => sec.projects.forEach(p => ALL.push({ ...p, section: sec.key })));
const state = {};
ALL.forEach((_, i) => { state[i] = { decision: null, note: '' }; });

// Build section start indices
const SEC_START = {};
let gi = 0;
SECTIONS.forEach(sec => { SEC_START[sec.key] = gi; gi += sec.projects.length; });

let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const container = document.getElementById('projectList');
  container.innerHTML = '';

  SECTIONS.forEach(sec => {
    const items = sec.projects.map((p, li) => ({ p, i: SEC_START[sec.key] + li }));

    const visible = items.filter(({ p, i }) => {
      if (currentFilter === 'all') return true;
      if (currentFilter === 'focus') return sec.key === 'focus';
      if (currentFilter === 'active') return sec.key === 'active';
      if (currentFilter === 'stopped') return sec.key === 'stopped';
      if (currentFilter === 'unreviewed') return !state[i].decision;
      return true;
    });

    if (!visible.length) return;

    const sh = document.createElement('div');
    sh.className = 'section-header';
    sh.innerHTML = `<span class="section-label ${sec.cls}">${sec.label}</span><div class="section-divider"></div><span class="section-count">${visible.length} 项</span>`;
    container.appendChild(sh);

    visible.forEach(({ p, i }) => {
      const s = state[i];
      const statusLabel = { approve:'✓ Approve', reject:'✗ Reject', notyet:'○ Not Yet', keepgoing:'→ Keep Going' }[s.decision] || '— Pending';
      const tagMap = { stopped:['tag-stopped','停止'], active:['tag-active','进行中'], focus:['tag-focus','重点'], pending:['tag-pending','待定'] };
      const [tagCls, tagTxt] = tagMap[p.tag] || ['tag-pending','待定'];

      const card = document.createElement('div');
      card.className = `project-card${sec.key==='focus'?' focus-card':''}${s.decision?' selected-'+s.decision:''}`;
      card.id = `card-${i}`;
      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(${i})">
          <span class="project-index">${String(i+1).padStart(2,'0')}</span>
          <div class="project-info">
            <div class="project-name">${p.name}</div>
            ${p.url?`<a class="project-url" href="${p.url}" target="_blank" onclick="event.stopPropagation()">${p.url}</a>`:''}
            ${p.desc?`<div class="project-desc">${p.desc}</div>`:''}
          </div>
          <span class="card-tag ${tagCls}">${tagTxt}</span>
          <span class="card-status ${s.decision||''}">${statusLabel}</span>
          <span class="toggle-icon" id="icon-${i}">›</span>
        </div>
        <div class="card-body" id="body-${i}">
          <div class="decision-row">
            ${['approve','reject','notyet','keepgoing'].map(v=>`
              <button class="decision-btn${s.decision===v?' active':''}" data-value="${v}" onclick="setDecision(${i},'${v}')">
                ${{approve:'✓ Approve',reject:'✗ Reject',notyet:'○ Not Yet',keepgoing:'→ Keep Going'}[v]}
              </button>`).join('')}
          </div>
          <div class="note-row">
            <span class="note-label">备注 Note</span>
            <textarea class="note-input" id="note-${i}" placeholder="可选 · 填写备注..." oninput="state[${i}].note=this.value">${s.note||''}</textarea>
          </div>
        </div>`;
      container.appendChild(card);
    });
  });

  updateProgress();
}

function toggleCard(i) {
  const body = document.getElementById(`body-${i}`);
  const icon = document.getElementById(`icon-${i}`);
  if (!body) return;
  body.classList.toggle('open');
  icon.style.transform = body.classList.contains('open') ? 'rotate(90deg)' : '';
}

function setDecision(i, value) {
  state[i].decision = value;
  renderList();
  setTimeout(() => {
    const body = document.getElementById(`body-${i}`);
    const icon = document.getElementById(`icon-${i}`);
    if (body) { body.classList.add('open'); icon.style.transform = 'rotate(90deg)'; }
  }, 10);
}

function updateProgress() {
  const done = Object.values(state).filter(s=>s.decision).length;
  const total = ALL.length;
  document.getElementById('progressFill').style.width = (total ? done/total*100 : 0) + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total} 已评审`;
}

function submitReport() {
  const now = new Date();
  const ts = now.toISOString().replace('T',' ').slice(0,19);
  const counts = { approve:0, reject:0, notyet:0, keepgoing:0, pending:0 };
  Object.values(state).forEach(s => counts[s.decision||'pending']++);

  const L = [];
  L.push(`╔═══════════════════════════════════════════════════════╗`);
  L.push(`║          WORK REVIEW LOG — TJ Development Inc.        ║`);
  L.push(`╚═══════════════════════════════════════════════════════╝`);
  L.push(``);
  L.push(`TIMESTAMP   : ${ts}`);
  L.push(`TOTAL ITEMS : ${ALL.length}`);
  L.push(`REVIEWED    : ${Object.values(state).filter(s=>s.decision).length}`);
  L.push(``);

  SECTIONS.forEach(sec => {
    L.push(`┌─ ${sec.label.toUpperCase()} ─────────────────────────────────────┐`);
    sec.projects.forEach((p, li) => {
      const i = SEC_START[sec.key] + li;
      const s = state[i];
      L.push(`│ [${String(i+1).padStart(2,'0')}] ${p.name}`);
      L.push(`│      TAG      : ${p.tag.toUpperCase()}`);
      L.push(`│      DECISION : ${(s.decision||'pending').toUpperCase()}`);
      if (p.url)  L.push(`│      URL      : ${p.url}`);
      if (s.note) L.push(`│      NOTE     : ${s.note}`);
      L.push(`│`);
    });
    L.push(`└───────────────────────────────────────────────────────┘`);
    L.push(``);
  });

  L.push(`SUMMARY`);
  L.push(`  ✓ Approve   : ${counts.approve}`);
  L.push(`  ✗ Reject    : ${counts.reject}`);
  L.push(`  ○ Not Yet   : ${counts.notyet}`);
  L.push(`  → Keep Going: ${counts.keepgoing}`);
  L.push(`  — Pending   : ${counts.pending}`);
  L.push(``);
  L.push(`END OF REPORT ══════════════════════════════════════════════`);

  const logText = L.join('\n');
  document.getElementById('logContent').textContent = logText;
  document.getElementById('overlay').classList.add('open');
  console.log('%c[WORK REVIEW LOG]','color:#4af0a0;font-weight:bold;font-size:13px');
  console.log(logText);
}

function copyLog() {
  navigator.clipboard.writeText(document.getElementById('logContent').textContent).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy Log', 1500);
  });
}

function downloadLog() {
  const text = document.getElementById('logContent').textContent;
  const date = new Date().toISOString().slice(0,10);
  const blob = new Blob([text], { type:'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `work-review-${date}.txt`;
  a.click();
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeOverlay(e) { if(e.target.id==='overlay') closeModal(); }

(function initDate() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('dateStamp').innerHTML =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}<br>${days[d.getDay()]}`;
})();

renderList();
</script>
</body>
</html>
